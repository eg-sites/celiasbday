<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Aniversário da Célia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fff8f4; --red: #b20d18; --deep-red: #7f0912;
      --rose: #e07090; --blush: #f6d0dd; --soft-pink: #fce8f0;
      --font-serif: 'Cormorant Garamond', serif;
      --font-sans:  'Jost', sans-serif;
      --radius: 12px; --shadow: 0 4px 24px rgba(178,13,24,.1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--deep-red);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    #gate {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .gate-card {
      background: white;
      border-radius: var(--radius);
      padding: 3rem 2.5rem;
      box-shadow: var(--shadow);
      max-width: 360px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    .gate-card h1 {
      font-family: var(--font-serif);
      font-size: 1.7rem;
      font-style: italic;
      font-weight: 400;
      color: var(--deep-red);
    }
    .gate-card p { font-size: 0.85rem; color: var(--rose); }
    .gate-input {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1.5px solid var(--blush);
      border-radius: 100px;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      color: var(--deep-red);
      background: var(--soft-pink);
      outline: none;
      transition: border-color .2s;
    }
    .gate-input:focus { border-color: var(--red); }
    .btn-enter {
      width: 100%;
      padding: 0.85rem;
      background: var(--red);
      color: white;
      border: none;
      border-radius: 100px;
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .btn-enter:hover { background: var(--deep-red); }
    .btn-enter:active { transform: scale(0.97); }
    .gate-error { color: var(--red); font-size: 0.8rem; min-height: 1em; }

    /* ── ADMIN PANEL ── */
    #admin { display: none; padding: 2rem 1.5rem; max-width: 960px; margin: 0 auto; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .admin-header h1 { font-family: var(--font-serif); font-size: 1.8rem; font-style: italic; }
    .admin-header small { font-size: 0.75rem; color: var(--rose); }
    .btn-refresh {
      padding: 0.55rem 1.2rem;
      border: 1.5px solid var(--blush);
      border-radius: 100px;
      background: white;
      color: var(--red);
      font-family: var(--font-sans);
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color .2s;
    }
    .btn-refresh:hover { border-color: var(--red); }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem;
      box-shadow: var(--shadow);
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .stat-card__value {
      font-family: var(--font-serif);
      font-size: 2.4rem;
      font-weight: 600;
      color: var(--red);
      line-height: 1;
    }
    .stat-card__label {
      font-size: 0.7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--rose);
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 0.7rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 0.7rem 1rem;
      border: 1.5px solid var(--blush);
      border-radius: 100px;
      font-family: var(--font-sans);
      font-size: 0.88rem;
      outline: none;
      background: white;
      color: var(--deep-red);
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--red); }
    .filter-select {
      padding: 0.7rem 1rem;
      border: 1.5px solid var(--blush);
      border-radius: 100px;
      font-family: var(--font-sans);
      font-size: 0.82rem;
      outline: none;
      background: white;
      color: var(--deep-red);
      cursor: pointer;
    }
    .filter-select:focus { border-color: var(--red); }

    /* Table */
    .table-wrap { overflow-x: auto; background: white; border-radius: var(--radius); box-shadow: var(--shadow); }
    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    th {
      text-align: left;
      padding: 0.9rem 1rem;
      font-size: 0.65rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--rose);
      font-weight: 600;
      border-bottom: 1.5px solid var(--blush);
      white-space: nowrap;
    }
    td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--soft-pink);
      color: var(--deep-red);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--soft-pink); }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.7rem;
      border-radius: 100px;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: .05em;
    }
    .badge--yes { background: #e8f5e9; color: #2e7d32; }
    .badge--no  { background: var(--soft-pink); color: var(--rose); }
    .empty-state { text-align: center; padding: 3rem; color: var(--rose); font-style: italic; font-family: var(--font-serif); }
    .loading { text-align: center; padding: 2rem; color: var(--rose); font-style: italic; }
    .error-msg { background: #fff0f0; border: 1px solid var(--blush); border-radius: var(--radius); padding: 1rem; color: var(--red); font-size: 0.85rem; margin-bottom: 1rem; }
    .section-title {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      font-style: italic;
      margin-bottom: 0.8rem;
      color: var(--deep-red);
    }
  </style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-card">
    <h1>Área Admin</h1>
    <p>Aniversário da Célia Bizerra João</p>
    <input class="gate-input" type="password" id="admin-key" placeholder="Chave de acesso..." autocomplete="off" />
    <p class="gate-error" id="gate-error"></p>
    <button class="btn-enter" id="btn-enter">Entrar</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin">
  <div class="admin-header">
    <div>
      <h1>Dashboard ✦</h1>
      <small id="last-updated">—</small>
    </div>
    <button class="btn-refresh" id="btn-refresh">↻ Atualizar</button>
  </div>

  <div id="error-container"></div>

  <!-- Stats -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><span class="stat-card__value" id="s-dinner-total">—</span><span class="stat-card__label">Total Jantar</span></div>
    <div class="stat-card"><span class="stat-card__value" id="s-dinner-companions">—</span><span class="stat-card__label">Acomp. Jantar</span></div>
    <div class="stat-card"><span class="stat-card__value" id="s-dinner-grand">—</span><span class="stat-card__label">Grand Total Jantar</span></div>
    <div class="stat-card"><span class="stat-card__value" id="s-after-total">—</span><span class="stat-card__label">Total After</span></div>
    <div class="stat-card"><span class="stat-card__value" id="s-after-companions">—</span><span class="stat-card__label">Acomp. After</span></div>
    <div class="stat-card"><span class="stat-card__value" id="s-after-grand">—</span><span class="stat-card__label">Grand Total After</span></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <input class="search-input" type="search" id="search-input" placeholder="Pesquisar por nome..." />
    <select class="filter-select" id="filter-select">
      <option value="all">Todos</option>
      <option value="both">Jantar + After</option>
      <option value="dinner-only">Só Jantar</option>
      <option value="after-only">Só After</option>
      <option value="none">Recusaram tudo</option>
    </select>
  </div>

  <!-- Table -->
  <p class="section-title">Lista de Confirmações</p>
  <div class="table-wrap">
    <div id="table-loading" class="loading">A carregar dados...</div>
    <table id="guests-table" style="display:none">
      <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>Jantar</th>
          <th>Acomp. Jantar</th>
          <th>After</th>
          <th>Acomp. After</th>
          <th>Data</th>
        </tr>
      </thead>
      <tbody id="guests-tbody"></tbody>
    </table>
    <div id="empty-state" class="empty-state" style="display:none">Nenhuma resposta encontrada.</div>
  </div>
</div>

<script src="config.js"></script>
<script src="admin.js"></script>
</body>
</html>
